<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#4a7c59">
  <meta name="description" content="Tea Timer - Track your tea steeping times">
  <link rel="apple-touch-icon" href="assets/icon-192.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <title>Tea Timer</title>
</head>
<body>
  <div id="root">
    <header class="app-header">
      <h1>🍵 Tea Timer</h1>
      <button class="btn-settings" id="btn-settings">⚙️</button>
    </header>

    <nav class="tea-selector" id="tea-selector">
      <!-- populated by JS -->
    </nav>

    <main class="timer-area" id="timer-area">
      <div class="timer-ring-row">
        <button class="btn-time-adjust btn-time-minus" id="btn-time-minus">−</button>
        <div class="progress-ring-container">
          <svg viewBox="0 0 220 220" class="progress-ring" id="progress-svg">
            <circle class="progress-track" cx="110" cy="110" r="90"/>
            <circle class="progress-bar" id="progress-bar" cx="110" cy="110" r="90"/>
          </svg>
          <div class="timer-display" id="timer-display">00:00</div>
        </div>
        <button class="btn-time-adjust btn-time-plus" id="btn-time-plus">+</button>
      </div>
      <div class="steep-info" id="steep-info">차를 선택하세요</div>
    </main>

    <footer class="timer-controls">
      <button class="btn-control btn-secondary" id="btn-reset">리셋</button>
      <button class="btn-control btn-primary" id="btn-start-pause">시작</button>
      <button class="btn-control btn-next" id="btn-next">다음 우림</button>
    </footer>

    <!-- 프리셋 편집 모달 -->
    <div class="modal-overlay" id="modal-overlay" style="display:none">
      <div class="modal">
        <h3 id="modal-title">차 편집</h3>
        <div class="modal-field">
          <label>아이콘 (이모지)</label>
          <input type="text" id="edit-icon" maxlength="2" placeholder="🍵">
        </div>
        <div class="modal-field">
          <label>이름</label>
          <input type="text" id="edit-name" placeholder="차 이름">
        </div>
        <div class="modal-field">
          <label>권장 온도</label>
          <input type="text" id="edit-temp" placeholder="80-90°C">
        </div>
        <div class="modal-field">
          <label>회차별 우림 시간 (초)</label>
          <div id="steeps-editor"></div>
          <button class="btn-add-steep" id="btn-add-steep">+ 회차 추가</button>
        </div>
        <div class="modal-actions">
          <button class="btn-modal-cancel" id="btn-modal-cancel">취소</button>
          <button class="btn-modal-save" id="btn-modal-save">저장</button>
        </div>
      </div>
    </div>

    <!-- 설정 모달 -->
    <div class="modal-overlay" id="settings-modal" style="display:none">
      <div class="modal">
        <div class="settings-modal-header">
          <h3>프리셋 관리</h3>
          <button class="btn-close-modal" id="btn-settings-close">✕</button>
        </div>
        <div id="presets-list"></div>
        <button class="btn-add-preset" id="btn-add-preset">+ 새 차 추가</button>
      </div>
    </div>
  </div>

  <script src="js/storage.js" defer></script>
  <script src="js/presets.js" defer></script>
  <script src="js/timer.js" defer></script>
  <script src="js/app.js" defer></script>

  <script defer>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(err => {
        console.warn('Service Worker registration failed:', err);
      });
    }
  </script>
</body>
</html>
