<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#4a7c59">
  <meta name="description" content="Tea Timer - Track your tea steeping times">
  <link rel="apple-touch-icon" href="assets/icon-192.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <title>Tea Timer</title>
</head>
<body>
  <div id="root">
    <div class="view" id="view-home">
      <header class="home-header">
        <h1>🍵 Tea Timer</h1>
      </header>
      <main class="home-main">
        <div class="tea-grid" id="tea-grid">
          <!-- populated by JS -->
        </div>
      </main>
    </div>
    <div class="view" id="view-timer">
      <header class="timer-header">
        <button class="btn-back" id="btn-back">←</button>
        <div class="timer-title">
          <span id="timer-tea-name">녹차</span>
          <span class="steep-label" id="timer-steep-label">1회차</span>
        </div>
      </header>
      <main class="timer-main">
        <div class="progress-ring-container">
          <svg viewBox="0 0 220 220" class="progress-ring" id="progress-svg">
            <circle class="progress-track" cx="110" cy="110" r="90"/>
            <circle class="progress-bar" id="progress-bar" cx="110" cy="110" r="90"/>
          </svg>
          <div class="timer-display" id="timer-display">00:00</div>
        </div>
        <div class="steep-info" id="steep-info">1 / 5 회차</div>
      </main>
      <footer class="timer-controls">
        <button class="btn-control btn-secondary" id="btn-reset">리셋</button>
        <button class="btn-control btn-primary" id="btn-start-pause">시작</button>
        <button class="btn-control btn-next" id="btn-next">다음 우림</button>
      </footer>
    </div>
    <div class="view" id="view-settings"></div>
  </div>

  <script src="js/storage.js" defer></script>
  <script src="js/presets.js" defer></script>
  <script src="js/timer.js" defer></script>
  <script src="js/app.js" defer></script>

  <script defer>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(err => {
        console.warn('Service Worker registration failed:', err);
      });
    }
  </script>
</body>
</html>
