<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#4a7c59">
  <meta name="description" content="Tea Timer - Track your tea steeping times">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <title>Tea Timer</title>
</head>
<body>
  <div id="root">
    <div class="view" id="view-home"></div>
    <div class="view" id="view-timer"></div>
    <div class="view" id="view-settings"></div>
  </div>

  <script src="js/storage.js" defer></script>
  <script src="js/presets.js" defer></script>
  <script src="js/timer.js" defer></script>
  <script src="js/app.js" defer></script>

  <script defer>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(err => {
        console.warn('Service Worker registration failed:', err);
      });
    }
  </script>
</body>
</html>
