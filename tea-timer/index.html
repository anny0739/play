<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#4a7c59">
  <meta name="description" content="Tea Timer - Track your tea steeping times">
  <link rel="apple-touch-icon" href="assets/icon-192.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <title>Tea Timer</title>
</head>
<body>
  <div id="root">
    <div class="view" id="view-home">
      <header class="home-header">
        <h1>🍵 Tea Timer</h1>
        <button class="btn-settings" id="btn-settings">⚙️</button>
      </header>
      <main class="home-main">
        <div class="tea-grid" id="tea-grid">
          <!-- populated by JS -->
        </div>
      </main>
    </div>
    <!-- Timer bottom sheet (not a view — overlays home) -->
    <div class="sheet-overlay" id="sheet-overlay"></div>
    <div class="timer-sheet" id="timer-sheet">
      <div class="sheet-handle"></div>
      <header class="timer-header">
        <div class="timer-title">
          <span id="timer-tea-name">녹차</span>
          <span class="steep-label" id="timer-steep-label">1회차</span>
        </div>
        <button class="btn-close-sheet" id="btn-back">✕</button>
      </header>
      <main class="timer-main">
        <div class="progress-ring-container">
          <svg viewBox="0 0 220 220" class="progress-ring" id="progress-svg">
            <circle class="progress-track" cx="110" cy="110" r="90"/>
            <circle class="progress-bar" id="progress-bar" cx="110" cy="110" r="90"/>
          </svg>
          <div class="timer-display" id="timer-display">00:00</div>
        </div>
        <div class="steep-info" id="steep-info">1 / 5 회차</div>
      </main>
      <footer class="timer-controls">
        <button class="btn-control btn-secondary" id="btn-reset">리셋</button>
        <button class="btn-control btn-primary" id="btn-start-pause">시작</button>
        <button class="btn-control btn-next" id="btn-next">다음 우림</button>
      </footer>
    </div>
    <div class="view" id="view-settings">
      <header class="settings-header">
        <button class="btn-back" id="btn-settings-back">←</button>
        <h2>프리셋 관리</h2>
      </header>
      <main class="settings-main">
        <div id="presets-list"></div>
        <button class="btn-add-preset" id="btn-add-preset">+ 새 차 추가</button>
      </main>
    </div>

    <!-- 프리셋 편집 모달 -->
    <div class="modal-overlay" id="modal-overlay" style="display:none">
      <div class="modal">
        <h3 id="modal-title">차 편집</h3>
        <div class="modal-field">
          <label>아이콘 (이모지)</label>
          <input type="text" id="edit-icon" maxlength="2" placeholder="🍵">
        </div>
        <div class="modal-field">
          <label>이름</label>
          <input type="text" id="edit-name" placeholder="차 이름">
        </div>
        <div class="modal-field">
          <label>권장 온도</label>
          <input type="text" id="edit-temp" placeholder="80-90°C">
        </div>
        <div class="modal-field">
          <label>회차별 우림 시간 (초)</label>
          <div id="steeps-editor"></div>
          <button class="btn-add-steep" id="btn-add-steep">+ 회차 추가</button>
        </div>
        <div class="modal-actions">
          <button class="btn-modal-cancel" id="btn-modal-cancel">취소</button>
          <button class="btn-modal-save" id="btn-modal-save">저장</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/storage.js" defer></script>
  <script src="js/presets.js" defer></script>
  <script src="js/timer.js" defer></script>
  <script src="js/app.js" defer></script>

  <script defer>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(err => {
        console.warn('Service Worker registration failed:', err);
      });
    }
  </script>
</body>
</html>
